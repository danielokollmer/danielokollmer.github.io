<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Interaktives Periodensystem</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0f1419">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Periodensystem">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<link rel="icon" type="image/png" sizes="48x48" href="icons/icon-48.png">
<link rel="icon" type="image/png" sizes="96x96" href="icons/icon-96.png">
<link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192.png">
<link rel="shortcut icon" type="image/png" href="icons/icon-96.png">
<meta name="description" content="Interaktives Periodensystem mit Leitner-Lernmodus, Quiz (20 Fragen), Karteikarten und Wiederholungsstapel. Alle 118 Elemente, DE/EN. Offline nutzbar.">
<script>
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./sw.js')
      .catch(err => console.warn('SW registration failed:', err));
  });
}
</script>
</head>
<body>
<!--
Version 2.1
Interaktives Periodensystem
Changelog:
  1.0 - Initial release
  1.1 - Marker: Beschriftung, Tooltip, Pulse-Highlight
  1.2 - SVG-Trichter (verworfen)
  1.3 - L-Linien außen am Grid ohne Überlappung
  2.0 - Leitner-System: Quiz 20 Fragen, Ergebnis, Wiederholungsstapel
  2.1 - Verbindungslinien neutral/monochrom; Aggregat bereinigt;
        Vorkommen-Filter (natürlich/synthetisch); Karteikarte:
        Entdeckung + Bedeutung + Synthese-Hintergrund
-->
<style>
  :root {
    --bg: #0f1419;
    --bg-elev: #1a2128;
    --bg-card: #232c36;
    --border: #2f3a45;
    --text: #e6edf3;
    --text-dim: #8b96a3;
    --accent: #4a9eff;
    --accent-dim: #2d5a8a;

    /* Element category colors — vintage / muted palette */
    --c-alkali:    #B85E4C;  /* terracotta        */
    --c-alkaline:  #B08040;  /* old gold          */
    --c-trans:     #A89244;  /* antique brass     */
    --c-posttrans: #6A8EAA;  /* slate blue        */
    --c-metalloid: #8070A4;  /* muted violet      */
    --c-nonmetal:  #5C8C64;  /* sage green        */
    --c-halogen:   #4A8882;  /* verdigris / patina*/
    --c-noble:     #A4687A;  /* old rose          */
    --c-lanth:     #B06E64;  /* muted salmon/clay */
    --c-act:       #7C60A2;  /* dusty amethyst    */
    --c-unknown:   #6C6860;  /* warm taupe        */
  }

  * { box-sizing: border-box; }

  body, html {
    margin: 0; padding: 0;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
  }

  .app { padding: 16px; max-width: 1600px; margin: 0 auto; }

  .header {
    display: flex; flex-wrap: wrap; gap: 12px; align-items: center;
    margin-bottom: 16px; padding-bottom: 12px;
    border-bottom: 1px solid var(--border);
  }
  .header h1 { margin: 0; font-size: 20px; font-weight: 600; }
  .header .spacer { flex: 1; }

  .controls { display: flex; flex-wrap: wrap; gap: 8px; align-items: center; }

  button, select, input {
    background: var(--bg-elev);
    color: var(--text);
    border: 1px solid var(--border);
    padding: 6px 12px;
    border-radius: 6px;
    font-size: 13px;
    font-family: inherit;
    cursor: pointer;
    transition: all 0.15s;
  }
  button:hover, select:hover { border-color: var(--accent); }
  button.active { background: var(--accent-dim); border-color: var(--accent); }
  input { cursor: text; min-width: 180px; }
  input:focus { outline: none; border-color: var(--accent); }

  .toolbar {
    display: flex; flex-wrap: wrap; gap: 10px;
    margin-bottom: 14px; align-items: center;
  }
  .toolbar-group {
    display: flex; gap: 6px; align-items: center;
    padding: 4px 10px; background: var(--bg-elev);
    border-radius: 8px; border: 1px solid var(--border);
  }
  .toolbar-group label {
    font-size: 11px; color: var(--text-dim);
    text-transform: uppercase; letter-spacing: 0.5px;
  }

  /* Periodic table grid */
  .ptable-wrap {
    position: relative;
    margin-bottom: 16px;
  }
  .ptable {
    display: grid;
    grid-template-columns: repeat(18, minmax(0, 1fr));
    gap: 3px;
  }

  /* SVG overlay (L-link connector) */
  .series-overlay {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    pointer-events: none;
    z-index: 3;
    overflow: visible;
  }

  /* SVG side-links: L-line runs left of grid, then into empty placeholder columns */
  .series-link {
    fill: none;
    stroke-width: 2;
    stroke-opacity: 0.6;
    stroke-linecap: round;
    stroke-linejoin: round;
    stroke-dasharray: 5 4;
    transition: stroke-opacity 0.2s, stroke-width 0.2s;
  }
  .series-link.active {
    stroke-opacity: 1;
    stroke-width: 2.8;
    stroke-dasharray: none;
  }
  .series-link-lanthanide { stroke: #000; }
  .series-link-actinide   { stroke: #000; }

  .series-dot { opacity: 0.7; transition: opacity 0.2s; }
  .series-dot.active { opacity: 1; }
  .series-dot-lanthanide { fill: #000; }
  .series-dot-actinide   { fill: #000; }

  @keyframes dash-flow {
    to { stroke-dashoffset: -18; }
  }
  .series-link.flowing {
    animation: dash-flow 0.85s linear infinite;
  }

  .cell {
    aspect-ratio: 1;
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 3px;
    display: flex; flex-direction: column;
    cursor: pointer;
    transition: transform 0.1s, box-shadow 0.1s, opacity 0.2s;
    position: relative;
    overflow: hidden;
    min-height: 0;
    z-index: 2;
  }
  .cell:hover {
    transform: scale(1.08);
    z-index: 10;
    box-shadow: 0 4px 16px rgba(0,0,0,0.4);
  }
  .cell.dim { opacity: 0.15; }
  .cell.highlight { box-shadow: 0 0 0 2px var(--accent); }

  /* Marker cells (Lanthanide/Actinide placeholders) — make them clearly interactive */
  .cell.marker {
    cursor: pointer;
    position: relative;
  }
  .cell.marker::after {
    content: "↓";
    position: absolute;
    top: 2px; right: 4px;
    font-size: 10px;
    color: rgba(0,0,0,0.55);
    font-weight: 700;
  }
  .cell.marker:hover {
    filter: brightness(1.1);
  }

  /* Pulse animation for highlighted series row */
  @keyframes series-pulse {
    0%, 100% { box-shadow: 0 0 0 0 var(--accent); }
    50%      { box-shadow: 0 0 0 3px var(--accent), 0 0 16px var(--accent); }
  }
  .cell.series-highlight {
    animation: series-pulse 0.7s ease-in-out 3;
    z-index: 5;
  }

  .num { font-size: 9px; color: rgba(0,0,0,0.65); line-height: 1; }
  .sym { font-size: 18px; font-weight: 700; color: #fff; line-height: 1.1; margin-top: auto; }
  .name { font-size: 7px; color: rgba(0,0,0,0.7); line-height: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .mass { font-size: 7px; color: rgba(0,0,0,0.6); line-height: 1; }

  /* Element category bg colors */
  .cat-alkali-metal       { background: var(--c-alkali); }
  .cat-alkaline-earth     { background: var(--c-alkaline); }
  .cat-transition-metal   { background: var(--c-trans); }
  .cat-post-transition    { background: var(--c-posttrans); }
  .cat-metalloid          { background: var(--c-metalloid); }
  .cat-nonmetal           { background: var(--c-nonmetal); }
  .cat-halogen            { background: var(--c-halogen); }
  .cat-noble-gas          { background: var(--c-noble); }
  .cat-lanthanide         { background: var(--c-lanth); }
  .cat-actinide           { background: var(--c-act); }
  .cat-unknown            { background: var(--c-unknown); }

  /* Labels in grid */
  .label-cell {
    display: flex; align-items: center; justify-content: center;
    font-size: 10px; color: var(--text-dim);
    background: transparent; border: none;
    pointer-events: none;
  }
  .placeholder { background: transparent; border: none; pointer-events: none; }

  /* Legend */
  .legend {
    display: flex; flex-wrap: wrap; gap: 8px;
    margin-bottom: 16px;
    padding: 10px; background: var(--bg-elev);
    border-radius: 8px; border: 1px solid var(--border);
  }
  .legend-item {
    display: flex; align-items: center; gap: 6px;
    font-size: 11px;
    cursor: pointer;
    padding: 3px 8px;
    border-radius: 4px;
    transition: background 0.15s;
  }
  .legend-item:hover { background: var(--bg-card); }
  .legend-swatch {
    width: 14px; height: 14px;
    border-radius: 3px;
    border: 1px solid rgba(0,0,0,0.2);
  }

  /* Trends colorbar */
  .trends-bar {
    display: none; align-items: center; gap: 12px;
    margin-bottom: 14px; padding: 10px;
    background: var(--bg-elev); border-radius: 8px;
    border: 1px solid var(--border);
  }
  .trends-bar.show { display: flex; flex-wrap: wrap; }
  .gradient {
    height: 14px; flex: 1; min-width: 180px;
    border-radius: 4px;
    background: linear-gradient(to right, #2d5a8a, #4a9eff, #ffd43b, #ff8787);
  }

  /* Modal */
  .modal-overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.75);
    display: none;
    align-items: center; justify-content: center;
    z-index: 100;
    padding: 20px;
  }
  .modal-overlay.show { display: flex; }
  .modal {
    background: var(--bg-elev);
    border-radius: 12px;
    border: 1px solid var(--border);
    max-width: 600px; width: 100%;
    max-height: 90vh; overflow-y: auto;
    padding: 24px;
    position: relative;
  }
  .modal-close {
    position: absolute; top: 12px; right: 12px;
    background: transparent; border: none; color: var(--text-dim);
    font-size: 20px; cursor: pointer; padding: 4px 10px;
  }
  .modal-close:hover { color: var(--text); }

  .el-header {
    display: flex; gap: 16px; align-items: center;
    margin-bottom: 16px; padding-bottom: 16px;
    border-bottom: 1px solid var(--border);
  }
  .el-badge {
    width: 80px; height: 80px; border-radius: 8px;
    display: flex; flex-direction: column; justify-content: center; align-items: center;
    color: #000;
  }
  .el-badge .b-num { font-size: 11px; align-self: flex-start; padding: 2px 6px; }
  .el-badge .b-sym { font-size: 32px; font-weight: 800; }
  .el-badge .b-mass { font-size: 9px; padding-bottom: 4px; }
  .el-title h2 { margin: 0 0 4px; font-size: 24px; }
  .el-title .cat { font-size: 13px; color: var(--text-dim); }

  .el-grid {
    display: grid; grid-template-columns: repeat(2, 1fr);
    gap: 10px 20px;
  }
  .el-row {
    display: flex; justify-content: space-between;
    padding: 6px 0; border-bottom: 1px solid var(--border);
    font-size: 13px;
  }
  .el-row .k { color: var(--text-dim); }
  .el-row .v { font-weight: 500; text-align: right; }

  .el-section {
    margin-top: 16px; padding-top: 16px;
    border-top: 1px solid var(--border);
  }
  .el-section h3 {
    font-size: 12px; text-transform: uppercase;
    letter-spacing: 0.5px; color: var(--text-dim);
    margin: 0 0 8px;
  }
  .el-section p { margin: 0; font-size: 13px; line-height: 1.5; }

  .config-shells {
    display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px;
  }
  .shell-pill {
    background: var(--bg-card); border: 1px solid var(--border);
    padding: 4px 10px; border-radius: 14px; font-size: 12px;
  }
  .shell-pill .lbl { color: var(--text-dim); font-size: 10px; margin-right: 4px; }

  /* Quiz */
  .quiz-modal { max-width: 500px; }
  .quiz-q { font-size: 16px; margin-bottom: 16px; line-height: 1.5; }
  .quiz-opts { display: grid; gap: 8px; margin-bottom: 16px; }
  .quiz-opt {
    text-align: left; padding: 12px;
    background: var(--bg-card); border: 1px solid var(--border);
    border-radius: 6px; cursor: pointer;
    transition: all 0.15s;
  }
  .quiz-opt:hover { border-color: var(--accent); }
  .quiz-opt.correct { background: rgba(105, 219, 124, 0.2); border-color: var(--c-nonmetal); }
  .quiz-opt.wrong { background: rgba(255, 107, 107, 0.2); border-color: var(--c-alkali); }
  .quiz-opt:disabled { cursor: default; }
  .quiz-stats {
    display: flex; justify-content: space-between;
    margin-bottom: 12px; font-size: 13px; color: var(--text-dim);
  }
  .quiz-next { width: 100%; margin-top: 10px; padding: 10px; font-weight: 600; }

  /* Flashcard */
  .fc-card {
    perspective: 1000px;
    height: 280px;
    margin-bottom: 16px;
    cursor: pointer;
  }
  .fc-inner {
    position: relative; width: 100%; height: 100%;
    transition: transform 0.5s;
    transform-style: preserve-3d;
  }
  .fc-card.flipped .fc-inner { transform: rotateY(180deg); }
  .fc-front, .fc-back {
    position: absolute; inset: 0;
    backface-visibility: hidden;
    border-radius: 10px;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    padding: 20px;
    color: #000;
  }
  .fc-back { transform: rotateY(180deg); background: var(--bg-card); color: var(--text); padding: 24px; }
  .fc-front .fc-sym { font-size: 80px; font-weight: 800; }
  .fc-front .fc-num { font-size: 16px; }
  .fc-hint { font-size: 11px; color: var(--text-dim); margin-top: 10px; text-align: center; }
  .fc-back-row { display: flex; justify-content: space-between; width: 100%; padding: 6px 0; border-bottom: 1px solid var(--border); font-size: 13px; }
  .fc-back-row .k { color: var(--text-dim); }
  .fc-nav { display: flex; gap: 8px; }
  .fc-nav button { flex: 1; }

  /* ── Wissenstand (header) ── */
  .wissenstand {
    display: flex; gap: 10px; align-items: center;
    margin-top: 4px; font-size: 12px; color: var(--text-dim);
    flex-wrap: wrap;
  }
  .ws-pill {
    background: var(--bg-card); border: 1px solid var(--border);
    border-radius: 12px; padding: 3px 10px; font-size: 12px;
    display: inline-flex; align-items: center; gap: 6px;
  }
  .ws-pill .ws-val { color: var(--text); font-weight: 600; }
  .deck-btn {
    background: var(--bg-card); border: 1px solid var(--border);
    border-radius: 12px; padding: 3px 10px; font-size: 12px;
    cursor: pointer; display: inline-flex; align-items: center; gap: 5px;
    color: var(--text); transition: border-color 0.15s;
  }
  .deck-btn:hover { border-color: var(--accent); }
  .deck-badge {
    background: var(--c-alkali); color: #000; font-weight: 700;
    font-size: 11px; border-radius: 8px; padding: 1px 6px; min-width: 18px;
    text-align: center;
  }

  /* ── Quiz progress bar ── */
  .quiz-progress-wrap {
    height: 5px; background: var(--border); border-radius: 3px;
    margin-bottom: 14px; overflow: hidden;
  }
  .quiz-progress-bar {
    height: 100%; background: var(--accent);
    transition: width 0.3s; border-radius: 3px;
  }

  /* ── Quiz results ── */
  .result-score-wrap {
    display: flex; align-items: center; gap: 14px; margin-bottom: 16px;
    padding: 14px; background: var(--bg-card); border-radius: 8px;
    border: 1px solid var(--border);
  }
  .result-score-big {
    font-size: 36px; font-weight: 800; line-height: 1;
  }
  .result-score-sub { font-size: 12px; color: var(--text-dim); }
  .result-bar-wrap { flex: 1; }
  .result-bar-bg {
    height: 8px; background: var(--border); border-radius: 4px;
    overflow: hidden; margin-bottom: 4px;
  }
  .result-bar-fill { height: 100%; border-radius: 4px; }
  .result-deck-note {
    font-size: 12px; color: var(--text-dim); padding: 8px 0; margin-bottom: 10px;
  }
  .result-table {
    width: 100%; border-collapse: collapse; font-size: 12px;
    margin-bottom: 14px;
  }
  .result-table th {
    text-align: left; padding: 5px 6px;
    color: var(--text-dim); font-weight: 500;
    border-bottom: 1px solid var(--border); font-size: 11px;
  }
  .result-table td { padding: 5px 6px; border-bottom: 1px solid rgba(255,255,255,0.04); vertical-align: middle; }
  .result-table tr.row-wrong td { background: rgba(255,107,107,0.07); }
  .result-table tr.row-right td { background: rgba(105,219,124,0.05); }
  .el-micro {
    display: inline-flex; align-items: center; justify-content: center;
    width: 26px; height: 26px; border-radius: 4px;
    font-weight: 800; font-size: 12px; color: #000;
  }
  .result-actions {
    display: flex; gap: 8px; flex-wrap: wrap; margin-top: 4px;
  }
  .result-actions button { flex: 1; min-width: 110px; padding: 9px; }

  /* ── Deck / Review mode badge on fc title ── */
  .mode-badge {
    font-size: 10px; padding: 2px 8px; border-radius: 10px;
    margin-left: 8px; font-weight: 600; vertical-align: middle;
  }
  .mode-badge.review { background: var(--c-alkali); color: #000; }
  .mode-badge.full   { background: var(--accent-dim); color: var(--text); }
    .cell { aspect-ratio: 1; }
    .num { font-size: 7px; }
    .sym { font-size: 13px; }
    .name { display: none; }
    .mass { display: none; }
  }
  @media (max-width: 600px) {
    .ptable { gap: 1px; }
    .sym { font-size: 10px; }
    .num { font-size: 6px; }
  }
</style>

<main class="app" id="main">
  <div class="header">
    <div>
      <h1 id="title">Interaktives Periodensystem</h1>
      <div class="wissenstand" id="wissenstand" style="display:none;">
        <div class="ws-pill">📊 <span data-i18n="ws_label">Stand des Wissens:</span>&nbsp;<span class="ws-val" id="wsScore">—</span></div>
        <button class="deck-btn" id="deckBtn" style="display:none;" onclick="openReviewDeck()">
          🔄 <span data-i18n="ws_deck">Wiederholung</span>
          <span class="deck-badge" id="deckBadge">0</span>
        </button>
      </div>
    </div>
    <div class="spacer"></div>
    <div class="controls">
      <button id="langBtn">EN</button>
      <button onclick="window.open('hilfe.html','_blank')" title="Hilfe / Help">❓</button>
      <button id="quizBtn">🎯 <span data-i18n="quiz">Quiz</span></button>
      <button id="fcBtn">🃏 <span data-i18n="flashcards">Karteikarten</span></button>
    </div>
  </div>

  <div class="toolbar">
    <input type="text" id="search" data-i18n-ph="search_ph" placeholder="Suchen (Symbol, Name, Nr.)..." />
    <div class="toolbar-group">
      <label for="stateFilter" data-i18n="state">Aggregat:</label>
      <select id="stateFilter">
        <option value="all" data-i18n="all">Alle</option>
        <option value="solid" data-i18n="solid">Fest</option>
        <option value="liquid" data-i18n="liquid">Flüssig</option>
        <option value="gas" data-i18n="gas">Gasförmig</option>
      </select>
    </div>
    <div class="toolbar-group">
      <label for="occFilter" data-i18n="occ_label">Vorkommen:</label>
      <select id="occFilter">
        <option value="all" data-i18n="all">Alle</option>
        <option value="natural" data-i18n="occ_natural">Natürlich</option>
        <option value="synthetic" data-i18n="occ_synthetic">Synthetisch</option>
      </select>
    </div>
    <div class="toolbar-group">
      <label for="trendFilter" data-i18n="trend">Trend:</label>
      <select id="trendFilter">
        <option value="none" data-i18n="trend_none">Kategorie</option>
        <option value="atomicMass" data-i18n="trend_mass">Atommasse</option>
        <option value="electronegativity" data-i18n="trend_eneg">Elektronegativität</option>
        <option value="atomicRadius" data-i18n="trend_radius">Atomradius</option>
        <option value="ionizationEnergy" data-i18n="trend_ion">Ionisierungsenergie</option>
        <option value="meltingPoint" data-i18n="trend_melt">Schmelzpunkt</option>
        <option value="boilingPoint" data-i18n="trend_boil">Siedepunkt</option>
        <option value="density" data-i18n="trend_dens">Dichte</option>
      </select>
    </div>
    <button id="resetBtn" data-i18n="reset">Reset</button>
  </div>

  <div class="trends-bar" id="trendsBar">
    <span id="trendLabel" style="font-size: 12px; color: var(--text-dim);"></span>
    <span id="trendMin" style="font-size: 11px;"></span>
    <div class="gradient"></div>
    <span id="trendMax" style="font-size: 11px;"></span>
    <span id="trendUnit" style="font-size: 11px; color: var(--text-dim);"></span>
  </div>

  <div class="legend" id="legend"></div>

  <div class="ptable-wrap">
    <div class="ptable" id="ptable"></div>
    <svg class="series-overlay" id="seriesOverlay" aria-hidden="true"></svg>
  </div>

  <div style="font-size: 11px; color: var(--text-dim); text-align: center; margin-top: 8px;">
    <span data-i18n="hint">Klick auf Element für Details · Klick auf Legende zum Filtern</span>
  </div>

  <div style="margin-top:24px;padding-top:14px;border-top:1px solid var(--border);

// Grid positions: row, col (1-based, 18 cols)
// Lanthanides on row 8, Actinides on row 9, with markers in row 6/7 col 3
function getGridPos(el) {
  // Lanthanides 57-71 -> row 8, cols 3-17
  if (el.n >= 57 && el.n <= 71) {
    return { row: 8, col: 3 + (el.n - 57) };
  }
  // Actinides 89-103 -> row 9, cols 3-17
  if (el.n >= 89 && el.n <= 103) {
    return { row: 9, col: 3 + (el.n - 89) };
  }
  // For period 6: La (57) is moved to row 8, but Hf (72) onwards stays at row 6
  // For period 7: Ac (89) moved to row 9, Rf (104) onwards at row 7
  return { row: el.p, col: el.g };
}

  });

  renderLegend();

function getCatColor(cat) {
  const map = {
    "alkali-metal": "var(--c-alkali)",
    "alkaline-earth": "var(--c-alkaline)",
    "transition-metal": "var(--c-trans)",
    "post-transition": "var(--c-posttrans)",
    "metalloid": "var(--c-metalloid)",
    "nonmetal": "var(--c-nonmetal)",
    "halogen": "var(--c-halogen)",
    "noble-gas": "var(--c-noble)",
    "lanthanide": "var(--c-lanth)",
    "actinide": "var(--c-act)",
    "unknown": "var(--c-unknown)"
  };
  return map[cat] || map.unknown;
}

function renderLegend() {
  const lg = $("legend");
  lg.innerHTML = "";
  CATEGORIES.forEach(cat => {
    const item = document.createElement("div");
    item.className = "legend-item";
    if (state.catFilter === cat) item.style.background = "var(--bg-card)";
    item.innerHTML = `
      <div class="legend-swatch" style="background:${getCatColor(cat)}"></div>
      <span>${t("cat_" + cat.replace(/-/g, "_"))}</span>
    `;
    item.onclick = () => {
      state.catFilter = state.catFilter === cat ? null : cat;
      renderTable();
      renderLegend();
    };
    lg.appendChild(item);
  });
}

// Trend value -> color (HSL gradient)
function getTrendColor(value, min, max) {
  if (value == null || min === max) return "var(--bg-card)";
  const t = (value - min) / (max - min); // 0..1
  // Same gradient as the bar: #2d5a8a -> #4a9eff -> #ffd43b -> #ff8787
  const stops = [
    { p: 0,    r: 45,  g: 90,  b: 138 },
    { p: 0.33, r: 74,  g: 158, b: 255 },
    { p: 0.66, r: 255, g: 212, b: 59  },
    { p: 1,    r: 255, g: 135, b: 135 }
  ];
  let lo = stops[0], hi = stops[stops.length - 1];
  for (let i = 0; i < stops.length - 1; i++) {
    if (t >= stops[i].p && t <= stops[i+1].p) {
      lo = stops[i]; hi = stops[i+1]; break;
    }
  }
  const localT = (t - lo.p) / (hi.p - lo.p);
  const r = Math.round(lo.r + (hi.r - lo.r) * localT);
  const g = Math.round(lo.g + (hi.g - lo.g) * localT);
  const b = Math.round(lo.b + (hi.b - lo.b) * localT);
  return `rgb(${r},${g},${b})`;
}

function trendStats() {
  if (state.trend === "none") return null;
  const vals = ELEMENTS.map(e => e[state.trend]).filter(v => v != null);
  if (!vals.length) return null;
  return { min: Math.min(...vals), max: Math.max(...vals) };
}

const TREND_LABELS = {
  atomicMass: { de: "Atommasse", en: "Atomic mass", unit: "u" },
  electronegativity: { de: "Elektronegativität", en: "Electronegativity", unit: "" },
  atomicRadius: { de: "Atomradius", en: "Atomic radius", unit: "pm" },
  ionizationEnergy: { de: "Ionisierungsenergie", en: "Ionization energy", unit: "eV" },
  meltingPoint: { de: "Schmelzpunkt", en: "Melting point", unit: "K" },
  boilingPoint: { de: "Siedepunkt", en: "Boiling point", unit: "K" },
  density: { de: "Dichte", en: "Density", unit: "g/cm³" }
};

// Map trend keys to element data keys
const TREND_KEYS = {
  atomicMass: "mass",
  electronegativity: "en_p",
  atomicRadius: "r",
  ionizationEnergy: "ie",
  meltingPoint: "mp",
  boilingPoint: "bp",
  density: "dens"
};

function elementMatches(el) {
  if (state.search) {
    const q = state.search.toLowerCase();
    const ok = el.s.toLowerCase().includes(q) || el.de.toLowerCase().includes(q) ||
                el.en.toLowerCase().includes(q) || String(el.n) === q;
    if (!ok) return false;
  }
  // Phase filter uses corrected phase (synthetic → solid)
  if (state.stateFilter !== "all" && getPhase(el) !== state.stateFilter) return false;
  // Occurrence filter
  if (state.occ !== "all" && getOcc(el) !== state.occ) return false;
  // Category filter
  if (state.catFilter && el.cat !== state.catFilter) return false;
  return true;
}

function renderTable() {
  const grid = $("ptable");
  grid.innerHTML = "";

  // Trend setup
  let trendKey = null;
  let stats = null;
  if (state.trend !== "none") {
    trendKey = TREND_KEYS[state.trend];
    const vals = ELEMENTS.map(e => e[trendKey]).filter(v => v != null);
    if (vals.length) stats = { min: Math.min(...vals), max: Math.max(...vals) };
  }

  // Trends bar
  const tb = $("trendsBar");
  if (state.trend !== "none" && stats) {
    tb.classList.add("show");
    const lbl = TREND_LABELS[state.trend];
    $("trendLabel").textContent = lbl ? (lang === "de" ? lbl.de : lbl.en) : "";
    $("trendMin").textContent = stats.min.toFixed(stats.min < 1 ? 4 : 2);
    $("trendMax").textContent = stats.max.toFixed(stats.max < 1 ? 4 : 2);
    $("trendUnit").textContent = lbl ? lbl.unit : "";
  } else {
    tb.classList.remove("show");
  }

  // Build a position map
  const cells = {};
  ELEMENTS.forEach(el => {
    const pos = getGridPos(el);
    cells[`${pos.row}-${pos.col}`] = el;
  });

  // Render 9 rows x 18 cols
  for (let r = 1; r <= 9; r++) {
    for (let c = 1; c <= 18; c++) {
      const el = cells[`${r}-${c}`];

      // Markers for La/Ac series in main table
      if (r === 6 && c === 3) {
        const m = document.createElement("div");
        m.className = "cell cat-lanthanide marker";
        m.title = t("marker_tooltip");
        m.innerHTML = `
          <div class="num">57–71</div>
          <div class="sym" style="font-size:14px;">La–Lu</div>
          <div class="name">${t("lanthanides_short")}</div>
        `;
        m.onclick = () => highlightSeries("lanthanide");
        m.onmouseenter = () => setLinkActive("lanthanide", true);
        m.onmouseleave = () => setLinkActive("lanthanide", false);
        grid.appendChild(m);
        continue;
      }
      if (r === 7 && c === 3) {
        const m = document.createElement("div");
        m.className = "cell cat-actinide marker";
        m.title = t("marker_tooltip");
        m.innerHTML = `
          <div class="num">89–103</div>
          <div class="sym" style="font-size:14px;">Ac–Lr</div>
          <div class="name">${t("actinides_short")}</div>
        `;
        m.onclick = () => highlightSeries("actinide");
        m.onmouseenter = () => setLinkActive("actinide", true);
        m.onmouseleave = () => setLinkActive("actinide", false);
        grid.appendChild(m);
        continue;
      }

      // Empty separator row between row 7 and row 8
      if ((r === 8 || r === 9) && c < 3) {
        const ph = document.createElement("div");
        ph.className = "placeholder";
        grid.appendChild(ph);
        continue;
      }

      if (!el) {
        const ph = document.createElement("div");
        ph.className = "placeholder";
        grid.appendChild(ph);
        continue;
      }

      const cell = document.createElement("div");
      cell.className = "cell cat-" + el.cat;

      // Tag La/Ac series cells for highlight-on-marker-click and reverse link activation
      if (el.cat === "lanthanide") {
        cell.dataset.series = "lanthanide";
        cell.addEventListener("mouseenter", () => setLinkActive("lanthanide", true));
        cell.addEventListener("mouseleave", () => setLinkActive("lanthanide", false));
      } else if (el.cat === "actinide") {
        cell.dataset.series = "actinide";
        cell.addEventListener("mouseenter", () => setLinkActive("actinide", true));
        cell.addEventListener("mouseleave", () => setLinkActive("actinide", false));
      }

      // Apply trend coloring if active
      if (trendKey && stats) {
        const v = el[trendKey];
        cell.classList.remove("cat-" + el.cat);
        cell.style.background = v != null ? getTrendColor(v, stats.min, stats.max) : "var(--bg-card)";
      }

      // Filter dim
      if (!elementMatches(el)) cell.classList.add("dim");

      const name = lang === "de" ? el.de : el.en;
      cell.innerHTML = `
        <div class="num">${el.n}</div>
        <div class="sym">${el.s}</div>
        <div class="name">${name}</div>
        <div class="mass">${typeof el.mass === "number" ? el.mass.toFixed(2) : el.mass}</div>
      `;
      cell.onclick = () => showElement(el);
      grid.appendChild(cell);
    }
  }

  // Redraw connecting funnels after grid is laid out
  requestAnimationFrame(drawSeriesLinks);
}

  if (val == null) return t("unknown");
  if (typeof val !== "number") return val + (unit ? " " + unit : "");
  return val.toFixed(decimals) + (unit ? " " + unit : "");
}

// QUIZ — Leitner (20 questions, result screen, deck update)
// ============================================================
const QUIZ_SIZE = 20;
let quizState = { questions: [], answers: [], current: 0, score: 0, mode: "full", phase: "question" };

function shuffle(arr) { return [...arr].sort(() => Math.random() - 0.5); }

function generateQuestion(el, pool) {
  const nameKey = lang === "de" ? "de" : "en";
  const others = pool.filter(e => e.n !== el.n);
  const pick3 = (fn) => shuffle(others).slice(0, 3).map(fn);
  const qType = Math.floor(Math.random() * 5);
  let question, correct, options;
  switch (qType) {
    case 0:
      question = t("quiz_q1", el.s); correct = el[nameKey];
      options = [correct, ...pick3(e => e[nameKey])]; break;
    case 1:
      question = t("quiz_q2", el[nameKey]); correct = el.s;
      options = [correct, ...pick3(e => e.s)]; break;
    case 2:
      question = t("quiz_q3", el[nameKey]); correct = String(el.n);
      options = [correct, ...pick3(e => String(e.n))]; break;
    case 3:
      question = t("quiz_q4", el.n); correct = el[nameKey];
      options = [correct, ...pick3(e => e[nameKey])]; break;
    case 4:
      question = t("quiz_q5", el[nameKey]);
      correct = t("cat_" + el.cat.replace(/-/g, "_"));
      const otherCats = CATEGORIES.filter(c => c !== el.cat);
      options = [correct, ...shuffle(otherCats).slice(0, 3).map(c => t("cat_" + c.replace(/-/g, "_")))]; break;
  }
  return { el, question, correct, options: shuffle(options) };
}

function openQuiz(mode = "full") {
  let pool;
  if (mode === "deck") {
    pool = [...reviewDeck.values()];
    if (pool.length < 4) {
      alert(t("quiz_deck_empty")); return;
    }
  } else {
    pool = ELEMENTS.slice(0, 86);
  }
  const n = Math.min(QUIZ_SIZE, pool.length);
  const chosen = shuffle(pool).slice(0, n);
  quizState = {
    questions: chosen.map(el => generateQuestion(el, pool.length >= 4 ? pool : ELEMENTS.slice(0, 86))),
    answers: new Array(n).fill(null),
    current: 0, score: 0, mode, phase: "question"
  };
  $("quizModal").classList.add("show");
  renderQuizQuestion();
}

function renderQuizQuestion() {
  const { questions, current, score } = quizState;
  const { question, correct, options } = questions[current];
  const n = questions.length;
  const pct = Math.round((current / n) * 100);
  $("quizContent").innerHTML = `
    <button class="modal-close" onclick="closeQuiz()">×</button>
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;">
      <strong style="font-size:14px;">${t(quizState.mode === "deck" ? "quiz_mode_deck" : "quiz_title")}</strong>
      <span style="font-size:12px;color:var(--text-dim);">${t("quiz_progress", current + 1, n)}</span>
    </div>
    <div class="quiz-progress-wrap">
      <div class="quiz-progress-bar" style="width:${pct}%"></div>
    </div>
    <div class="quiz-q">${question}</div>
    <div class="quiz-opts" id="quizOpts">
      ${options.map(o => `<button class="quiz-opt" data-opt="${o.replace(/"/g, "&quot;")}">${o}</button>`).join("")}
    </div>
    <div id="quizFeedback"></div>
  `;
  document.querySelectorAll(".quiz-opt").forEach(btn => {
    btn.onclick = () => handleQuizAnswer(btn.dataset.opt, correct);
  });
}

function handleQuizAnswer(selected, correct) {
  const isRight = selected === correct;
  if (isRight) quizState.score++;
  quizState.answers[quizState.current] = { selected, isRight };

  document.querySelectorAll(".quiz-opt").forEach(btn => {
    btn.disabled = true;
    if (btn.dataset.opt === correct) btn.classList.add("correct");
    else if (btn.dataset.opt === selected) btn.classList.add("wrong");
  });

  const last = quizState.current === quizState.questions.length - 1;
  $("quizFeedback").innerHTML = `
    <div style="margin-top:10px;font-size:13px;color:${isRight ? "var(--c-nonmetal)" : "var(--c-alkali)"};">
      ${isRight ? t("quiz_correct") : t("quiz_wrong") + " <strong>" + correct + "</strong>"}
    </div>
    <button class="quiz-next" onclick="${last ? "showQuizResult()" : "advanceQuiz()"}" style="margin-top:10px;width:100%;padding:10px;font-weight:600;">
      ${last ? t("quiz_result_title") + " →" : t("quiz_next")}
    </button>
  `;
}

function advanceQuiz() {
  quizState.current++;
  renderQuizQuestion();
}

function showQuizResult() {
  quizState.phase = "result";
  const { questions, answers, score, mode } = quizState;
  const n = questions.length;
  const pct = Math.round((score / n) * 100);
  const nameKey = lang === "de" ? "de" : "en";

  // Update session stats
  sessionStats.totalQ += n;
  sessionStats.totalCorrect += score;
  sessionStats.rounds++;

  // Update review deck
  const newWrong = [];
  questions.forEach(({ el }, i) => {
    if (!answers[i]?.isRight) {
      if (!reviewDeck.has(el.n)) newWrong.push(el);
      reviewDeck.set(el.n, el);
    } else if (mode === "deck") {
      // Correct in deck quiz → remove from deck (Leitner: promote out)
      reviewDeck.delete(el.n);
    }
  });
  updateWissenstand();

  // Deck note
  let deckNote = "";
  if (newWrong.length > 0 && reviewDeck.size > newWrong.length) {
    deckNote = t("quiz_result_deck_already", newWrong.length, reviewDeck.size);
  } else if (newWrong.length > 0) {
    deckNote = t("quiz_result_added", newWrong.length);
  } else {
    deckNote = t("quiz_result_none_added");
  }

  // Color bar
  const barColor = pct >= 80 ? "var(--c-nonmetal)" : pct >= 50 ? "var(--c-trans)" : "var(--c-alkali)";

  // Rows for result table
  const rows = questions.map(({ el, question, correct }, i) => {
    const ans = answers[i];
    const ok = ans?.isRight;
    const sym = el.s;
    const cat = el.cat;
    return `<tr class="${ok ? "row-right" : "row-wrong"}">
      <td>${i + 1}</td>
      <td><span class="el-micro cat-${cat}">${sym}</span></td>
      <td style="max-width:160px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;" title="${question}">${question}</td>
      <td style="color:${ok ? "var(--c-nonmetal)" : "var(--c-alkali)"};">${ans?.selected ?? "—"}</td>
      <td>${ok ? "✓" : `<span style="color:var(--c-nonmetal);font-size:11px;">${correct}</span>`}</td>
    </tr>`;
  }).join("");

  const deckSize = reviewDeck.size;
  $("quizContent").innerHTML = `
    <button class="modal-close" onclick="closeQuiz()">×</button>
    <h2 style="margin-top:0;font-size:18px;">${t("quiz_result_title")}</h2>

    <div class="result-score-wrap">
      <div>
        <div class="result-score-big" style="color:${barColor};">${score}<span style="font-size:18px;color:var(--text-dim);">/${n}</span></div>
        <div class="result-score-sub">${t("quiz_result_pct", pct)}</div>
      </div>
      <div class="result-bar-wrap">
        <div class="result-bar-bg"><div class="result-bar-fill" style="width:${pct}%;background:${barColor};"></div></div>
        <div style="font-size:11px;color:var(--text-dim);">${t("quiz_result_score", score, n)}</div>
      </div>
    </div>

    <div class="result-deck-note">${deckNote}</div>

    <div style="max-height:260px;overflow-y:auto;border:1px solid var(--border);border-radius:6px;">
      <table class="result-table">
        <thead><tr>
          <th>${t("quiz_col_nr")}</th>
          <th>${t("quiz_col_el")}</th>
          <th>${t("quiz_col_q")}</th>
          <th>${t("quiz_col_answer")}</th>
          <th>${t("quiz_col_correct")}</th>
        </tr></thead>
        <tbody>${rows}</tbody>
      </table>
    </div>

    <div class="result-actions" style="margin-top:12px;">
      <button onclick="openQuiz('full')" style="background:var(--bg-card);">${t("quiz_retry")}</button>
      ${deckSize >= 4 ? `<button onclick="openQuiz('deck')" style="background:var(--accent-dim);">${t("quiz_deck_start", deckSize)}</button>` : ""}
      ${deckSize > 0 ? `<button onclick="openReviewDeck()" style="background:var(--bg-card);">🃏 ${t("ws_deck")} (${deckSize})</button>` : ""}
      <button onclick="closeQuiz()" style="background:transparent;border-color:var(--border);">${t("quiz_close")}</button>
    </div>
  `;
}

function closeQuiz() {
  $("quizModal").classList.remove("show");
}

// ============================================================
// FLASHCARDS — Normal + Review Deck
// ============================================================
let fcState = { idx: 0, flipped: false, deck: [], mode: "full" };

function openFlashcards(mode = "full") {
  fcState.mode = mode;
  if (mode === "review") {
    fcState.deck = shuffle([...reviewDeck.values()]);
    if (fcState.deck.length === 0) {
      $("fcContent").innerHTML = `
        <button class="modal-close" onclick="closeFc()">×</button>
        <h2 style="margin-top:0;">${t("fc_title_review")}</h2>
        <p style="color:var(--text-dim);text-align:center;padding:30px 0;">${t("fc_deck_empty")}</p>
        <button onclick="closeFc();openQuiz();" style="width:100%;">🎯 ${t("quiz_title")}</button>
      `;
      $("fcModal").classList.add("show");
      return;
    }
  } else {
    fcState.deck = shuffle(ELEMENTS.slice(0, 86));
  }
  fcState.idx = 0; fcState.flipped = false;
  renderFlashcard();
  $("fcModal").classList.add("show");
}

function openReviewDeck() {
  closeQuiz();
  openFlashcards("review");
}

function renderFlashcard() {
  const el = fcState.deck[fcState.idx];
  const name = lang === "de" ? el.de : el.en;
  const catName = t("cat_" + el.cat.replace(/-/g, "_"));
  const isReview = fcState.mode === "review";
  const inDeck = reviewDeck.has(el.n);
  const titleStr = isReview ? t("fc_title_review") : t("fc_title");
  const badge = isReview ? `<span class="mode-badge review">Wiederholung</span>` : "";
  const deckSize = reviewDeck.size;
  const isSynth = SYNTHETIC_ELEMENTS.has(el.n);

  // Extra card data
  const useText = ELEM_USE[lang]?.[el.n] || ELEM_USE["de"]?.[el.n] || "—";
  const synthText = ELEM_SYNTH[lang]?.[el.n] || ELEM_SYNTH["de"]?.[el.n] || null;
  const discStr = el.disc
    ? `${el.disc}${el.by ? " · " + el.by : ""}`
    : (lang === "de" ? "seit der Antike bekannt" : "known since antiquity");
  const phaseName = (() => {
    const p = getPhase(el);
    const map = { solid: t("solid"), liquid: t("liquid"), gas: t("gas") };
    return map[p] || p;
  })();
  const occLabel = isSynth ? t("occ_syn_label") : t("occ_nat_label");

  $("fcContent").innerHTML = `
    <button class="modal-close" onclick="closeFc()">×</button>
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;">
      <h2 style="margin:0;font-size:16px;">${titleStr}${badge}</h2>
      <span style="font-size:12px;color:var(--text-dim);">${t("fc_card", fcState.idx + 1, fcState.deck.length)}</span>
    </div>
    <div class="quiz-progress-wrap">
      <div class="quiz-progress-bar" style="width:${Math.round(((fcState.idx + 1) / fcState.deck.length) * 100)}%"></div>
    </div>
    <div class="fc-card ${fcState.flipped ? "flipped" : ""}" id="fcCard">
      <div class="fc-inner">
        <div class="fc-front cat-${el.cat}">
          <div class="fc-num">${el.n}</div>
          <div class="fc-sym">${el.s}</div>
        </div>
        <div class="fc-back" style="overflow-y:auto;align-items:flex-start;justify-content:flex-start;padding:16px;">
          <div style="font-size:18px;font-weight:700;margin-bottom:10px;width:100%;">${name} <span style="font-size:12px;color:var(--text-dim);font-weight:400;">${el.s} · ${el.n}</span></div>
          <div class="fc-back-row"><span class="k">${t("atomic_mass")}</span><span>${typeof el.mass === "number" ? el.mass.toFixed(3) : el.mass} u</span></div>
          <div class="fc-back-row"><span class="k">${t("state_phase")}</span><span>${phaseName}</span></div>
          <div class="fc-back-row"><span class="k">${t("card_occurrence")}</span><span style="color:${isSynth ? "var(--c-alkali)" : "var(--c-nonmetal)"};">${occLabel}</span></div>
          <div class="fc-back-row"><span class="k">${t("e_config")}</span><span style="font-family:monospace;font-size:11px;">${el.cfg}</span></div>
          <div class="fc-back-row" style="align-items:flex-start;"><span class="k">${t("card_discovery")}</span><span style="text-align:right;">${discStr}</span></div>
          <div style="margin-top:10px;padding-top:8px;border-top:1px solid var(--border);width:100%;">
            <div style="font-size:10px;color:var(--text-dim);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:4px;">${t("card_use")}</div>
            <div style="font-size:12px;line-height:1.5;">${useText}</div>
          </div>
          ${isSynth && synthText ? `
          <div style="margin-top:10px;padding-top:8px;border-top:1px solid var(--border);width:100%;">
            <div style="font-size:10px;color:var(--c-alkali);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:4px;">⚗ ${t("card_synth")}</div>
            <div style="font-size:12px;line-height:1.5;">${synthText}</div>
          </div>` : ""}
        </div>
      </div>
    </div>
    <div class="fc-hint">${t("fc_flip")}</div>
    <div style="display:flex;gap:8px;margin-top:10px;flex-wrap:wrap;">
      <button onclick="fcPrev()" ${fcState.idx === 0 ? "disabled" : ""} style="flex:1;">${t("fc_prev")}</button>
      <button onclick="fcNext()" ${fcState.idx === fcState.deck.length - 1 ? "disabled" : ""} style="flex:1;">${t("fc_next")}</button>
    </div>
    ${isReview && inDeck ? `
    <div style="display:flex;gap:8px;margin-top:8px;flex-wrap:wrap;">
      <button onclick="removeFromDeck(${el.n})" style="flex:1;font-size:12px;background:rgba(105,219,124,0.15);border-color:var(--c-nonmetal);">${t("fc_remove")}</button>
      ${deckSize >= 4 ? `<button onclick="closeFc();openQuiz('deck');" style="flex:1;font-size:12px;background:var(--accent-dim);">${t("fc_deck_quiz", deckSize)}</button>` : ""}
    </div>` : ""}
    ${!isReview && reviewDeck.size > 0 ? `
    <div style="margin-top:8px;">
      <button onclick="openFlashcards('review')" style="width:100%;font-size:12px;background:rgba(255,107,107,0.15);border-color:var(--c-alkali);">🔄 ${t("ws_deck")} (${reviewDeck.size})</button>
    </div>` : ""}
  `;
  $("fcCard").onclick = () => {
    fcState.flipped = !fcState.flipped;
    $("fcCard").classList.toggle("flipped");
  };
}

function removeFromDeck(elN) {
  reviewDeck.delete(elN);
  updateWissenstand();
  // Remove from current deck view and advance
  fcState.deck = fcState.deck.filter(e => e.n !== elN);
  if (fcState.deck.length === 0) {
    closeFc(); return;
  }
  if (fcState.idx >= fcState.deck.length) fcState.idx = fcState.deck.length - 1;
  fcState.flipped = false;
  renderFlashcard();
}

function fcPrev() {
  if (fcState.idx > 0) { fcState.idx--; fcState.flipped = false; renderFlashcard(); }
}
function fcNext() {
  if (fcState.idx < fcState.deck.length - 1) { fcState.idx++; fcState.flipped = false; renderFlashcard(); }
}
function closeFc() { $("fcModal").classList.remove("show"); }

// ============================================================
// SERIES LINKS — L-shaped SVG lines, no element overlap
// Route: marker → left of grid (app padding) → placeholder cols → series row
// ============================================================
function drawSeriesLinks() {
  const overlay = document.getElementById("seriesOverlay");
  const wrap = document.querySelector(".ptable-wrap");
  if (!overlay || !wrap) return;

  const wrapRect = wrap.getBoundingClientRect();
  if (wrapRect.width === 0) return;

  overlay.setAttribute("width", wrapRect.width);
  overlay.setAttribute("height", wrapRect.height);
  overlay.setAttribute("viewBox", `0 0 ${wrapRect.width} ${wrapRect.height}`);

  const rel = (el) => {
    const r = el.getBoundingClientRect();
    return { x: r.left - wrapRect.left, y: r.top - wrapRect.top, w: r.width, h: r.height };
  };

  // Build a simple VERTICAL line from marker center to first series cell center.
  // The line sits just left of col-3 (in the 3px gap between col-2 and col-3),
  // offset slightly so both lines are distinguishable where they run in parallel.
  // SVG z-index > cell z-index, so the line renders on top everywhere.
  function buildLink(marker, firstCell, xOff) {
    if (!marker || !firstCell) return null;
    const m  = rel(marker);
    const fc = rel(firstCell);

    // x: just inside the left edge of the marker/col-3, slightly offset per series
    const xLine = m.x + xOff;
    const yTop  = m.y  + m.h  * 0.5;   // center of marker cell
    const yBot  = fc.y + fc.h * 0.5;   // center of first series cell

    return {
      d: `M ${xLine} ${yTop} L ${xLine} ${yBot}`,
      dots: [
        { cx: xLine, cy: yTop, r: 4 },   // dot on marker
        { cx: xLine, cy: yBot, r: 4 },   // dot on first series cell
      ]
    };
  }

  let html = "";

  const lMarker = wrap.querySelector(".cell.marker.cat-lanthanide");
  const lanths  = [...wrap.querySelectorAll('[data-series="lanthanide"]')];
  const lM = lMarker ? rel(lMarker) : null;
  const lLink = buildLink(lMarker, lanths[0], lM ? lM.w - 22 : 8);
  if (lLink) {
    html += `<path d="${lLink.d}" class="series-link series-link-lanthanide" id="link-lanthanide"/>`;
    lLink.dots.forEach(d =>
      html += `<circle cx="${d.cx}" cy="${d.cy}" r="${d.r}" class="series-dot series-dot-lanthanide link-dot-lanthanide"/>`
    );
  }

  const aMarker = wrap.querySelector(".cell.marker.cat-actinide");
  const acts    = [...wrap.querySelectorAll('[data-series="actinide"]')];
  const aM = aMarker ? rel(aMarker) : null;
  const aLink = buildLink(aMarker, acts[0], aM ? aM.w - 11 : 14);
  if (aLink) {
    html += `<path d="${aLink.d}" class="series-link series-link-actinide" id="link-actinide"/>`;
    aLink.dots.forEach(d =>
      html += `<circle cx="${d.cx}" cy="${d.cy}" r="${d.r}" class="series-dot series-dot-actinide link-dot-actinide"/>`
    );
  }

  overlay.innerHTML = html;
}

function setLinkActive(type, on) {
  const link = document.getElementById(`link-${type}`);
  if (link) on ? link.classList.add("active", "flowing") : link.classList.remove("active", "flowing");
  document.querySelectorAll(`.link-dot-${type}`).forEach(d =>
    on ? d.classList.add("active") : d.classList.remove("active")
  );
}

// ============================================================
// SERIES HIGHLIGHT (Lanthanide / Actinide marker click)
// ============================================================
function highlightSeries(type) {
  const cells = document.querySelectorAll(`.cell[data-series="${type}"]`);
  if (!cells.length) return;

  // Scroll the first cell of the series into view
  cells[0].scrollIntoView({ behavior: "smooth", block: "center" });

  // Pulse-highlight all cells of the series
  cells.forEach(c => {
    c.classList.remove("series-highlight");
    void c.offsetWidth;
    c.classList.add("series-highlight");
  });

  // Also pulse the connecting funnel
  setLinkActive(type, true);

  setTimeout(() => {
    cells.forEach(c => c.classList.remove("series-highlight"));
    setLinkActive(type, false);
  }, 2200);
}

// ============================================================
// EVENT WIRING
// ============================================================
$("langBtn").onclick = () => { lang = lang === "de" ? "en" : "de"; updateI18n(); };
$("search").addEventListener("input", e => { state.search = e.target.value.trim(); renderTable(); });
$("stateFilter").onchange = e => { state.stateFilter = e.target.value; renderTable(); };
$("occFilter").onchange = e => { state.occ = e.target.value; renderTable(); };
$("trendFilter").onchange = e => { state.trend = e.target.value; renderTable(); };
$("resetBtn").onclick = () => {
  state = { search: "", stateFilter: "all", occ: "all", trend: "none", catFilter: null };
  $("search").value = ""; $("stateFilter").value = "all";
  $("occFilter").value = "all"; $("trendFilter").value = "none";
  renderTable(); renderLegend();
};
$("quizBtn").onclick = () => openQuiz("full");
$("fcBtn").onclick = () => openFlashcards("full");

["modal", "quizModal", "fcModal"].forEach(id => {
  $(id).onclick = (e) => { if (e.target.id === id) $(id).classList.remove("show"); };
});
document.addEventListener("keydown", e => {
  if (e.key === "Escape") ["modal", "quizModal", "fcModal"].forEach(id => $(id).classList.remove("show"));
});

// Expose to global for inline onclick handlers
window.closeModal = closeModal;
window.closeQuiz = closeQuiz;
window.closeFc = closeFc;
window.advanceQuiz = advanceQuiz;
window.showQuizResult = showQuizResult;
window.openQuiz = openQuiz;
window.openFlashcards = openFlashcards;
window.openReviewDeck = openReviewDeck;
window.removeFromDeck = removeFromDeck;
window.fcPrev = fcPrev;
window.fcNext = fcNext;
window.highlightSeries = highlightSeries;
window.setLinkActive = setLinkActive;

// SVG resize
const _wrap = document.querySelector(".ptable-wrap");
if (_wrap && typeof ResizeObserver !== "undefined") {
  new ResizeObserver(() => drawSeriesLinks()).observe(_wrap);
}
window.addEventListener("resize", () => drawSeriesLinks());

// Init
updateI18n();
</script>

</body>
